<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tulipán Digital - Revelado</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #050005; 
            touch-action: none;
            font-family: 'Consolas', monospace;
        }
        canvas { display: block; width: 100vw; height: 100vh; }

        /* Contenedor de la imagen del repositorio */
        #revelado-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 0, 5, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease;
        }
        #revelado-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        #imagen-local {
            max-width: 90%;
            max-height: 70%;
            border: 1px solid rgba(255, 150, 200, 0.3);
            border-radius: 10px;
            box-shadow: 0 0 40px rgba(255, 150, 200, 0.2);
            object-fit: contain;
        }
        #close-btn {
            margin-top: 40px;
            padding: 12px 30px;
            background: transparent;
            border: 1px solid #ff96c8;
            color: #ff96c8;
            border-radius: 25px;
            font-size: 0.9rem;
            letter-spacing: 2px;
            cursor: pointer;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="revelado-overlay">
        <img id="imagen-local" src="imagen.jpg" alt="Imagen del repositorio">
        <button id="close-btn" onclick="cerrarImagen()">REGRESAR</button>
    </div>

    <script id="vertexShader" type="x-shader/x-vertex">
        attribute float aSize;
        attribute float aPhase; 
        varying vec3 vPos;
        uniform float uTime;
        void main() {
            vec3 pos = position;
            vec3 beeMotion = vec3(
                sin(uTime * 3.0 + aPhase * 10.0),
                cos(uTime * 3.5 + aPhase * 12.0),
                sin(uTime * 2.8 + aPhase * 8.0)
            ) * aSize * 0.8;
            pos += beeMotion;
            vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
            gl_Position = projectionMatrix * mvPosition;
            gl_PointSize = (4.0 * aSize) * (50.0 / -mvPosition.z);
            vPos = position; 
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        varying vec3 vPos;
        void main() {
            vec2 coord = gl_PointCoord - vec2(0.5);
            if(length(coord) > 0.5) discard; 
            vec3 color;
            if (vPos.y < 0.0 && length(vPos.xz) < 5.0) {
                color = vec3(0.2, 0.8, 0.3);
            } else if (vPos.y >= 0.0 && vPos.y <= 18.0 && length(vPos.xz) < 15.0) {
                float h = vPos.y / 18.0; 
                color = mix(vec3(1.0, 0.1, 0.4), vec3(1.0, 0.6, 0.8), h);
            } else {
                color = vec3(1.0, 0.9, 0.7);
            }
            float strength = pow(1.0 - (length(coord) * 2.0), 1.5);
            gl_FragColor = vec4(color, strength * 0.85);
        }
    </script>

    <script>
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050005, 0.005);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 70; camera.position.y = 5;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const starsGeometry = new THREE.BufferGeometry();
        const starsPositions = [];
        for(let i = 0; i < 1500; i++) starsPositions.push((Math.random()-0.5)*300, (Math.random()-0.5)*300, (Math.random()-0.5)*200-50);
        starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starsPositions, 3));
        scene.add(new THREE.Points(starsGeometry, new THREE.PointsMaterial({color: 0xffe6f0, size: 0.8, transparent: true, opacity: 0.6})));

        const geometry = new THREE.BufferGeometry();
        const positions = []; const sizes = []; const phases = []; 
        for(let i = 0; i < 4000; i++) {
            let t = Math.random(); let y = -25 + 25 * t;
            positions.push((0.5+Math.random()*0.2)*Math.cos(Math.random()*Math.PI*2), y, (0.5+Math.random()*0.2)*Math.sin(Math.random()*Math.PI*2));
            sizes.push(0.3 + Math.random()*0.5); phases.push(Math.random());
        }
        for(let i = 0; i < 25000; i++) {
            let h = Math.random(); let theta = Math.random()*Math.PI*2; let r = 9*Math.pow(h,0.4)*(1.1-h)*(1+0.15*Math.sin(3*theta));
            positions.push(r*Math.cos(theta)+(Math.random()-0.5)*0.6, h*18+(Math.random()-0.5)*0.6, r*Math.sin(theta)+(Math.random()-0.5)*0.6);
            sizes.push(0.5+Math.random()*0.8); phases.push(Math.random());
        }
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
        geometry.setAttribute('aSize', new THREE.Float32BufferAttribute(sizes, 1));
        geometry.setAttribute('aPhase', new THREE.Float32BufferAttribute(phases, 1)); 

        const material = new THREE.ShaderMaterial({
            vertexShader: document.getElementById('vertexShader').textContent,
            fragmentShader: document.getElementById('fragmentShader').textContent,
            uniforms: { uTime: { value: 0 } },
            transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
        });

        const tulip = new THREE.Points(geometry, material);
        const baseOffsetY = -2; tulip.position.y = baseOffsetY;
        scene.add(tulip);

        const state = { targetX: 0, targetY: baseOffsetY, targetRotX: 0, currentX: 0, currentY: baseOffsetY, currentRotX: 0 };
        let pressTimer = null;
        let startTouchX = 0, startTouchY = 0;

        window.addEventListener('touchstart', (e) => {
            if (e.touches.length > 0) {
                const touch = e.touches[0];
                startTouchX = touch.clientX; startTouchY = touch.clientY;
                updateTarget(touch);
                clearTimeout(pressTimer);
                pressTimer = setTimeout(() => { document.getElementById('revelado-overlay').classList.add('show'); }, 10000);
            }
        });

        window.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                const touch = e.touches[0];
                updateTarget(touch);
                if (Math.hypot(touch.clientX - startTouchX, touch.clientY - startTouchY) > 20) clearTimeout(pressTimer);
            }
        });

        window.addEventListener('touchend', () => {
            state.targetX = 0; state.targetY = baseOffsetY; state.targetRotX = 0;
            clearTimeout(pressTimer);
        });

        function updateTarget(touch) {
            const nX = (touch.clientX / window.innerWidth) - 0.5;
            const nY = (touch.clientY / window.innerHeight) - 0.5;
            state.targetX = nX * 12; state.targetY = baseOffsetY + (-nY * 15); state.targetRotX = nY * 0.6;
        }

        function cerrarImagen() { document.getElementById('revelado-overlay').classList.remove('show'); }

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            material.uniforms.uTime.value = clock.getElapsedTime();
            state.currentX += (state.targetX - state.currentX) * 0.05;
            state.currentY += (state.targetY - state.currentY) * 0.05;
            state.currentRotX += (state.targetRotX - state.currentRotX) * 0.05;
            tulip.position.set(state.currentX, state.currentY + Math.sin(clock.getElapsedTime()) * 1.2, 0);
            tulip.rotation.x = state.currentRotX;
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
