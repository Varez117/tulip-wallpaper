<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Esencia para Ingrid</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050005; touch-action: none; font-family: 'Consolas', monospace; color: #fff; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #revelado-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; /* Fondo negro puro */
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end; /* Imagen abajo */
            z-index: 100; opacity: 0; pointer-events: none; transition: opacity 2s ease-out;
            padding-bottom: 5vh; /* Espacio abajo */
        }
        #revelado-overlay.show { opacity: 1; pointer-events: auto; }
        #imagen-local {
            max-width: 80%; max-height: 50vh; /* Mitad inferior */
            border: 1px solid rgba(255, 150, 200, 0.2); border-radius: 8px;
            object-fit: contain; box-shadow: 0 0 30px rgba(255,150,200,0.1);
        }
        #close-btn {
            margin-top: 30px; padding: 10px 25px;
            background: transparent; border: 1px solid rgba(255,150,200,0.5); color: #ff96c8;
            border-radius: 20px; font-size: 0.8rem; letter-spacing: 1px; cursor: pointer;
        }
        
        #loading-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 0.8rem; color: rgba(255,255,255,0.4); letter-spacing: 2px; z-index: 200;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="loading-text">Cargando esencia...</div>

    <div id="revelado-overlay">
        <img id="imagen-local" src="imagen.jpg" alt="Regalo">
        <button id="close-btn" onclick="cerrarRevelado()">Regresar</button>
    </div>

    <script id="vertexShader" type="x-shader/x-vertex">
        attribute float aSize;
        attribute float aPhase; 
        varying vec3 vPos;
        uniform float uTime;
        uniform float uOpacity; // Nueva opacidad global controlada por Three.js

        void main() {
            vec3 pos = position;
            // Movimiento orgánico sutil
            vec3 beeMotion = vec3(
                sin(uTime * 2.0 + aPhase * 10.0),
                cos(uTime * 2.5 + aPhase * 12.0),
                sin(uTime * 1.8 + aPhase * 8.0)
            ) * aSize * 0.5;
            pos += beeMotion;

            vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
            gl_Position = projectionMatrix * mvPosition;
            gl_PointSize = (4.0 * aSize) * (50.0 / -mvPosition.z);
            vPos = position; 
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        varying vec3 vPos;
        uniform float uOpacity; // Recibimos la opacidad

        void main() {
            vec2 coord = gl_PointCoord - vec2(0.5);
            if(length(coord) > 0.5) discard; 
            vec3 color;
            // Coloreado basado en posición 3D
            if (vPos.y < 0.0 && length(vPos.xz) < 5.0) {
                color = vec3(0.2, 0.8, 0.3); // Tallo verde
            } else if (vPos.y >= 0.0 && vPos.y <= 18.0 && length(vPos.xz) < 15.0) {
                float h = vPos.y / 18.0; 
                color = mix(vec3(1.0, 0.1, 0.4), vec3(1.0, 0.6, 0.8), h); // Pétalos rosa/magenta
            } else {
                color = vec3(1.0, 0.9, 0.7); // Halo/Texto amarillo pálido
            }
            // Brillo y opacidad
            float strength = pow(1.0 - (length(coord) * 2.0), 1.5);
            gl_FragColor = vec4(color, strength * 0.85 * uOpacity);
        }
    </script>

    <script>
        // --- CONFIGURACIÓN BASE ---
        const els = { overlay: document.getElementById('revelado-overlay'), loading: document.getElementById('loading-text') };
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050005);
        scene.fog = new THREE.FogExp2(0x050005, 0.005);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 80; camera.position.y = 8; // Más alejada para el texto

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const clock = new THREE.Clock();
        let starField;
        const tulipGroup = new THREE.Group(); scene.add(tulipGroup);
        const textGroup = new THREE.Group(); scene.add(textGroup);

        // --- SISTEMA DE PARTÍCULAS (Material Compartido) ---
        const baseMaterial = new THREE.ShaderMaterial({
            vertexShader: document.getElementById('vertexShader').textContent,
            fragmentShader: document.getElementById('fragmentShader').textContent,
            uniforms: { uTime: { value: 0 }, uOpacity: { value: 1.0 } }, // Visibles al inicio
            transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
        });
        
        const textMaterial = baseMaterial.clone(); 
        textMaterial.uniforms.uOpacity.value = 0.0; // Texto oculto al inicio

        // 1. Estrellas
        const starsGeometry = new THREE.BufferGeometry();
        const starsPositions = [];
        for(let i = 0; i < 1500; i++) starsPositions.push((Math.random()-0.5)*400, (Math.random()-0.5)*400, (Math.random()-0.5)*300-50);
        starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starsPositions, 3));
        starField = new THREE.Points(starsGeometry, new THREE.PointsMaterial({color: 0xffe6f0, size: 1.0, transparent: true, opacity: 0.6}));
        scene.add(starField);

        // 2. Geometría del Tulipán
        const tulipGeometry = new THREE.BufferGeometry();
        const tulipPos = []; const tulipSizes = []; const tulipPhases = []; 
        
        // Tallo y Cabeza
        for(let i = 0; i < 4000; i++) {
            positionsAlongCylinder(tulipPos, tulipSizes, tulipPhases, 0.6, -25, 0, 0.4);
        }
        for(let i = 0; i < 28000; i++) {
            positionsAlongTulipHead(tulipPos, tulipSizes, tulipPhases);
        }
        // Halo sutil alrededor
        for(let i = 0; i < 3000; i++) {
            let r = 20 + Math.random()*5; let theta = Math.random()*Math.PI*2;
            tulipPos.push(r*Math.cos(theta), Math.random()*15, r*Math.sin(theta));
            tulipSizes.push(0.3); tulipPhases.push(Math.random());
        }
        tulipGeometry.setAttribute('position', new THREE.Float32BufferAttribute(tulipPos, 3));
        tulipGeometry.setAttribute('aSize', new THREE.Float32BufferAttribute(tulipSizes, 1));
        tulipGeometry.setAttribute('aPhase', new THREE.Float32BufferAttribute(tulipPhases, 1)); 

        const tulipPoints = new THREE.Points(tulipGeometry, baseMaterial);
        tulipGroup.add(tulipPoints);

        // --- CARGA DE FUENTES Y GENERACIÓN DE TEXTO ---
        const fontLoader = new THREE.FontLoader();
        // Cargamos una fuente helvetiker desde CDN. Requiere conexión.
        fontLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/fonts/helvetiker_regular.typeface.json', (font) => {
            const textString = "Te amo Ingrid";
            const textGeometry = new THREE.TextGeometry(textString, {
                font: font, size: 4.5, height: 1, curveSegments: 6,
                bevelEnabled: false
            });
            textGeometry.center(); // Centrar en su propio origen

            // Convertir la geometría de texto sólida en puntos
            const finalGeometry = new THREE.BufferGeometry();
            const positions = textGeometry.attributes.position.array;
            const textP = []; const textS = []; const textPh = [];
            
            for(let i = 0; i < positions.length; i += 3) {
                if(Math.random() > 0.4) { // Densidad de partículas
                    textP.push(positions[i] + (Math.random()-0.5)*0.2, positions[i+1] + (Math.random()-0.5)*0.2, positions[i+2]);
                    textS.push(0.6 + Math.random()*0.4); textPh.push(Math.random());
                }
            }
            finalGeometry.setAttribute('position', new THREE.Float32BufferAttribute(textP, 3));
            finalGeometry.setAttribute('aSize', new THREE.Float32BufferAttribute(textS, 1));
            finalGeometry.setAttribute('aPhase', new THREE.Float32BufferAttribute(textPh, 1));

            const textPoints = new THREE.Points(finalGeometry, textMaterial);
            // Situar arriba del tulipán (tuliphead llega a y=18)
            textPoints.position.set(0, 25, 0); 
            textGroup.add(textPoints);

            els.loading.style.display = 'none'; // Carga completa
            animate(); // Iniciar animación después de cargar fuente
        });

        // --- INTERACCIÓN Y LÓGICA DE PULSADO LARGO CON DESLIZAMIENTO ---
        const baseOffsetY = -5; tulipGroup.position.y = baseOffsetY; textGroup.position.y = baseOffsetY;
        const state = { targetX: 0, targetY: baseOffsetY, targetRotX: 0, currentX: 0, currentY: baseOffsetY, currentRotX: 0 };
        
        let isTouching = false;
        let lastSignificantMoveTime = performance.now();
        let startTouchX = 0, startTouchY = 0;
        let isRevealed = false;

        window.addEventListener('touchstart', (e) => {
            if (isRevealed || e.touches.length > 1) return;
            const touch = e.touches[0];
            startTouchX = touch.clientX; startTouchY = touch.clientY;
            updateTargets(touch);
            isTouching = true;
            lastSignificantMoveTime = performance.now(); // Reiniciar conteo
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            if (isRevealed || !isTouching) return;
            const touch = e.touches[0];
            updateTargets(touch);
            
            // Si el movimiento es significativo (más de un pequeño "glide"), reiniciamos el conteo
            if (Math.hypot(touch.clientX - startTouchX, touch.clientY - startTouchY) > 30) {
                lastSignificantMoveTime = performance.now();
                // Actualizar origen para el próximo cálculo de glide
                startTouchX = touch.clientX; startTouchY = touch.clientY;
            }
        }, { passive: false });

        window.addEventListener('touchend', () => { isTouching = false; resetTargets(); });
        window.addEventListener('touchcancel', () => { isTouching = false; resetTargets(); });

        function updateTargets(touch) {
            const nX = (touch.clientX / window.innerWidth) - 0.5;
            const nY = (touch.clientY / window.innerHeight) - 0.5;
            state.targetX = nX * 12; state.targetY = baseOffsetY + (-nY * 15); state.targetRotX = nY * 0.6;
        }
        function resetTargets() { state.targetX = 0; state.targetY = baseOffsetY; state.targetRotX = 0; }

        // --- LÓGICA DE REVELADO (Fades en Shader) ---
        function triggerRevelado() {
            if (isRevealed) return;
            isRevealed = true;
            isTouching = false; // Parar seguimiento táctil
            resetTargets(); // Regresar al centro
            
            // Secuencia visual WebGL
            starField.visible = false;
            scene.fog.color.set(0x000000); scene.background.set(0x000000); scene.fog.density = 0.01;

            // Mostrar Overlay HTML
            els.overlay.classList.add('show');
        }

        function cerrarRevelado() {
            els.overlay.classList.remove('show');
            setTimeout(() => { // Restaurar estado inicial
                isRevealed = false;
                starField.visible = true;
                scene.background.set(0x050005); scene.fog.color.set(0x050005); scene.fog.density = 0.005;
                // Reiniciar opacidades
                baseMaterial.uniforms.uOpacity.value = 1.0;
                textMaterial.uniforms.uOpacity.value = 0.0;
            }, 2000);
        }

        // --- CICLO DE ANIMACIÓN ---
        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();
            baseMaterial.uniforms.uTime.value = time;
            textMaterial.uniforms.uTime.value = time; // Mismo tiempo

            // 1. Manejo del pulsado largo con glide
            if (!isRevealed && isTouching) {
                // Si el dedo está quieto (o con glide menor al threshold) por 10s...
                if (performance.now() - lastSignificantMoveTime > 10000) {
                    triggerRevelado();
                }
            }

            // 2. Animaciones de revelado (Fades)
            if (isRevealed) {
                // Tulip desvanece (Fade Out)
                baseMaterial.uniforms.uOpacity.value = THREE.MathUtils.lerp(baseMaterial.uniforms.uOpacity.value, 0.0, 0.01);
                // Texto aparece (Fade In)
                textMaterial.uniforms.uOpacity.value = THREE.MathUtils.lerp(textMaterial.uniforms.uOpacity.value, 1.0, 0.02);
            }

            // 3. Interpolaciones táctiles
            state.currentX += (state.targetX - state.currentX) * 0.05;
            state.currentY += (state.targetY - state.currentY) * 0.05;
            state.currentRotX += (state.targetRotX - state.currentRotX) * 0.05;

            // 4. Aplicar transformaciones a los grupos
            tulipGroup.position.x = state.currentX;
            tulipGroup.position.y = state.currentY + Math.sin(time) * 1.2; 
            tulipGroup.rotation.x = state.currentRotX;

            textGroup.position.copy(tulipGroup.position); // Siguen al tulipán
            textGroup.rotation.copy(tulipGroup.rotation);

            renderer.render(scene, camera);
        }

        // --- HELPERS GEOMETRÍA TULIPÁN (Sin cambios) ---
        function positionsAlongCylinder(arr, sizes, phases, r, y1, y2, s) {
            let t = Math.random(); let angle = Math.random()*Math.PI*2;
            arr.push(r*Math.cos(angle), y1+(y2-y1)*t, r*Math.sin(angle));
            sizes.push(s); phases.push(Math.random());
        }
        function positionsAlongTulipHead(arr, sizes, phases) {
            let h = Math.random(); let theta = Math.random()*Math.PI*2;
            let r = 9*Math.pow(h,0.4)*(1.1-h)*(1+0.15*Math.sin(3*theta));
            arr.push(r*Math.cos(theta)+(Math.random()-0.5)*0.6, h*18+(Math.random()-0.5)*0.6, r*Math.sin(theta)+(Math.random()-0.5)*0.6);
            sizes.push(0.5+Math.random()*0.8); phases.push(Math.random());
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
