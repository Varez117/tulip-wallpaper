<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tulipán Digital - Fondo Móvil con Captura</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #050005; 
            touch-action: none; /* Crucial para evitar que la pantalla haga scroll en móviles */
            font-family: 'Consolas', monospace;
        }
        canvas { 
            display: block; 
            width: 100vw; 
            height: 100vh;
        }

        /* --- UI de la imagen generada --- */
        #image-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 0, 5, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        #image-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        #image-overlay p {
            color: #ff96c8;
            letter-spacing: 2px;
            margin-bottom: 20px;
            font-size: 1.2rem;
            text-shadow: 0 0 10px rgba(255, 150, 200, 0.5);
        }
        #captured-image {
            max-width: 80%;
            max-height: 60%;
            border: 2px solid rgba(255, 150, 200, 0.4);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            object-fit: contain;
        }
        #close-btn {
            margin-top: 30px;
            padding: 10px 25px;
            background: transparent;
            border: 1px solid #ff96c8;
            color: #ff96c8;
            border-radius: 20px;
            font-family: 'Consolas', monospace;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        #close-btn:active {
            background: rgba(255, 150, 200, 0.2);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="image-overlay">
        <p>Esencia capturada</p>
        <img id="captured-image" src="" alt="Captura del tulipán">
        <button id="close-btn" onclick="cerrarImagen()">Regresar</button>
    </div>

    <script id="vertexShader" type="x-shader/x-vertex">
        attribute float aSize;
        attribute float aPhase; 
        varying vec3 vPos;
        
        uniform float uTime;

        void main() {
            vec3 pos = position;

            // Físicas sutiles de enjambre (movimiento de respiración de la flor)
            vec3 beeMotion = vec3(
                sin(uTime * 3.0 + aPhase * 10.0),
                cos(uTime * 3.5 + aPhase * 12.0),
                sin(uTime * 2.8 + aPhase * 8.0)
            ) * aSize * 0.8;

            pos += beeMotion;

            vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
            gl_Position = projectionMatrix * mvPosition;
            
            // Tamaño responsivo según la profundidad
            gl_PointSize = (4.0 * aSize) * (50.0 / -mvPosition.z);
            vPos = position; 
        }
    </script>

    <script id="fragmentShader" type="x-shader/x-fragment">
        varying vec3 vPos;
        
        void main() {
            vec2 coord = gl_PointCoord - vec2(0.5);
            float dist = length(coord);
            if(dist > 0.5) discard; 

            vec3 color;

            // Coloreado del tallo vs Pétalos
            if (vPos.y < 0.0 && length(vPos.xz) < 5.0) {
                color = vec3(0.2, 0.8, 0.3); // Verde del tallo
            } else if (vPos.y >= 0.0 && vPos.y <= 18.0 && length(vPos.xz) < 15.0) {
                float h = vPos.y / 18.0; 
                vec3 baseColor = vec3(1.0, 0.1, 0.4); // Magenta oscuro
                vec3 topColor = vec3(1.0, 0.6, 0.8);  // Rosa claro
                color = mix(baseColor, topColor, h);
            } else {
                color = vec3(1.0, 0.9, 0.7); // Polvo estelar
            }

            // Suavizado de los bordes del punto
            float strength = 1.0 - (dist * 2.0);
            strength = pow(strength, 1.5);

            gl_FragColor = vec4(color, strength * 0.85);
        }
    </script>

    <script>
        // --- 1. CONFIGURACIÓN DE LA ESCENA ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050005, 0.005);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 70; 
        camera.position.y = 5;

        // preserveDrawingBuffer es OBLIGATORIO para poder exportar la imagen
        const renderer = new THREE.WebGLRenderer({ 
            antialias: true, 
            alpha: true, 
            powerPreference: "high-performance",
            preserveDrawingBuffer: true 
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // --- 2. GENERACIÓN DE PARTÍCULAS ---
        const starsGeometry = new THREE.BufferGeometry();
        const starsPositions = [];
        for(let i = 0; i < 1500; i++) {
            starsPositions.push((Math.random()-0.5)*300, (Math.random()-0.5)*300, (Math.random()-0.5)*200-50);
        }
        starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starsPositions, 3));
        const starField = new THREE.Points(starsGeometry, new THREE.PointsMaterial({color: 0xffe6f0, size: 0.8, transparent: true, opacity: 0.6}));
        scene.add(starField);

        const geometry = new THREE.BufferGeometry();
        const positions = []; const sizes = []; const phases = []; 
        
        for(let i = 0; i < 4000; i++) {
            let t = Math.random(); let y = -25 + 25 * t; let angle = Math.random() * Math.PI * 2; let r = 0.5 + Math.random() * 0.2;
            positions.push(r * Math.cos(angle), y, r * Math.sin(angle)); sizes.push(0.3 + Math.random() * 0.5); phases.push(Math.random()); 
        }
        for(let i = 0; i < 25000; i++) {
            let h = Math.random(); let theta = Math.random() * Math.PI * 2; let rBase = 9 * Math.pow(h, 0.4) * (1.1 - h);
            let r = rBase * (1 + 0.15 * Math.sin(3 * theta)); let x = r * Math.cos(theta); let z = r * Math.sin(theta); let y = h * 18; 
            positions.push(x + (Math.random()-0.5)*0.6, y + (Math.random()-0.5)*0.6, z + (Math.random()-0.5)*0.6);
            sizes.push(0.5 + Math.random() * 0.8); phases.push(Math.random()); 
        }
        for(let i = 0; i < 3000; i++) {
            let r = 15 + Math.random() * 20; let theta = Math.random() * Math.PI * 2; let phi = Math.acos((Math.random()*2)-1);
            positions.push(r * Math.sin(phi) * Math.cos(theta), r * Math.sin(phi) * Math.sin(theta) - 5, r * Math.cos(phi));
            sizes.push(Math.random() * 0.5); phases.push(Math.random()); 
        }

        geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
        geometry.setAttribute('aSize', new THREE.Float32BufferAttribute(sizes, 1));
        geometry.setAttribute('aPhase', new THREE.Float32BufferAttribute(phases, 1)); 

        const material = new THREE.ShaderMaterial({
            vertexShader: document.getElementById('vertexShader').textContent,
            fragmentShader: document.getElementById('fragmentShader').textContent,
            uniforms: { uTime: { value: 0 } },
            transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
        });

        const tulip = new THREE.Points(geometry, material);
        const baseOffsetY = -2; 
        tulip.position.y = baseOffsetY;
        scene.add(tulip);

        // --- 3. ESTADO E INTERACCIÓN TÁCTIL ---
        const state = {
            targetX: 0, targetY: baseOffsetY, targetRotX: 0,
            currentX: 0, currentY: baseOffsetY, currentRotX: 0,
            maxMoveX: 12, maxMoveY: 15, maxRotX: 0.6 
        };

        // Variables para la lógica de presión larga
        let pressTimer = null;
        let startTouchX = 0;
        let startTouchY = 0;
        const PRESS_DURATION = 10000; // 10,000 ms = 10 segundos
        const MOVE_THRESHOLD = 15; // Si el dedo se mueve más de 15px, cancelamos el temporizador

        window.addEventListener('touchstart', (e) => {
            if (e.touches.length > 0) {
                const touch = e.touches[0];
                startTouchX = touch.clientX;
                startTouchY = touch.clientY;
                handleTouchPosition(touch);

                // Iniciar el temporizador de 10 segundos
                clearTimeout(pressTimer);
                pressTimer = setTimeout(() => {
                    generarImagen();
                }, PRESS_DURATION);
            }
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                const touch = e.touches[0];
                handleTouchPosition(touch);

                // Si hay un temporizador activo, verificamos si el dedo se movió demasiado
                if (pressTimer) {
                    const dist = Math.hypot(touch.clientX - startTouchX, touch.clientY - startTouchY);
                    if (dist > MOVE_THRESHOLD) {
                        clearTimeout(pressTimer); // Cancelar la captura de imagen
                        pressTimer = null;
                    }
                }
            }
        }, { passive: false });

        window.addEventListener('touchend', () => {
            state.targetX = 0;
            state.targetY = baseOffsetY;
            state.targetRotX = 0;

            // Si levantas el dedo antes de los 10 segundos, cancelamos
            clearTimeout(pressTimer);
            pressTimer = null;
        });

        function handleTouchPosition(touch) {
            const normalizedX = (touch.clientX / window.innerWidth) - 0.5;
            const normalizedY = (touch.clientY / window.innerHeight) - 0.5;

            state.targetX = normalizedX * state.maxMoveX;
            state.targetY = baseOffsetY + (-normalizedY * state.maxMoveY); 
            state.targetRotX = normalizedY * state.maxRotX; 
        }

        // --- FUNCIONES PARA LA IMAGEN GENERADA ---
        function generarImagen() {
            // Asegurarnos de renderizar el frame actual antes de capturar
            renderer.render(scene, camera);
            
            // Obtener la imagen codificada en base64
            const imgData = renderer.domElement.toDataURL('image/png');
            
            // Mostrarla en la UI
            document.getElementById('captured-image').src = imgData;
            document.getElementById('image-overlay').classList.add('show');
        }

        function cerrarImagen() {
            document.getElementById('image-overlay').classList.remove('show');
            // Limpiar fuente para liberar memoria
            setTimeout(() => {
                document.getElementById('captured-image').src = "";
            }, 500);
        }

        // --- 4. CICLO DE ANIMACIÓN ---
        const clock = new THREE.Clock();
        
        function animate() {
            requestAnimationFrame(animate);
            const time = clock.getElapsedTime();
            
            material.uniforms.uTime.value = time;

            state.currentX += (state.targetX - state.currentX) * 0.05;
            state.currentY += (state.targetY - state.currentY) * 0.05;
            state.currentRotX += (state.targetRotX - state.currentRotX) * 0.05;

            tulip.position.x = state.currentX;
            tulip.position.y = state.currentY + Math.sin(time) * 1.5; 
            tulip.rotation.set(state.currentRotX, 0, 0);

            starField.position.x = -state.currentX * 0.1;
            starField.position.y = -(state.currentY - baseOffsetY) * 0.1;

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
